name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller openpyxl pillow
      - name: Build EXE
        run: |
          cd inventario_industrial_v2
          pyinstaller main.spec --clean --noconfirm
      - name: Upload EXE
        uses: actions/upload-artifact@v3
        with:
          name: InventarioIndustrial_EXE
          path: inventario_industrial_v2/dist/
